# One-shot Job that runs the BDD pack inside the qe-hack-syndicate namespace.
# Used as a fallback when Harness CI is unavailable (e.g. local kubectl run).
apiVersion: batch/v1
kind: Job
metadata:
  name: syndicate-bdd-tests
  namespace: qe-hack-syndicate
  labels:
    app: syndicate-bdd-tests
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app: syndicate-bdd-tests
    spec:
      restartPolicy: Never
      serviceAccountName: qe-hack-syndicate-k8s-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: git-clone
          image: alpine/git:2.45.2
          env:
            - name: GIT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: git-credentials
                  key: token
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              git clone --depth 1 \
                "https://${GIT_TOKEN}@github.com/syndicate-insights/syndicate-core-engine.git" \
                /workspace/syndicate-core-engine
          volumeMounts:
            - name: src
              mountPath: /workspace
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      containers:
        - name: maven
          image: maven:3.9.6-eclipse-temurin-21
          workingDir: /workspace/syndicate-core-engine/bdd-tests
          env:
            - name: QE_AGENT_URL
              value: http://qe-quality-agent.qe-hack-syndicate.svc.cluster.local:8080
            - name: QE_AGENT_TIMEOUT_SECONDS
              value: "900"
          command: ["mvn", "-B", "-ntp", "test"]
          volumeMounts:
            - name: src
              mountPath: /workspace
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: src
          emptyDir: {}
