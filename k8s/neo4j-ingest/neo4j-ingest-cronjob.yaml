apiVersion: batch/v1
kind: CronJob
metadata:
  name: neo4j-ingest-cronjob
  namespace: qe-hack-syndicate
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          serviceAccountName: qe-hack-syndicate-k8s-sa
          restartPolicy: OnFailure
          containers:
          - name: neo4j-ingest
            image: python:3.11-slim
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -e
                pip install --quiet google-cloud-bigquery neo4j

                python - <<'PY'
                import os
                import logging
                from datetime import datetime, timezone
                from google.cloud import bigquery
                from neo4j import GraphDatabase

                logging.basicConfig(
                    level=logging.INFO,
                    format="%(asctime)s [%(levelname)s] %(message)s",
                    datefmt="%Y-%m-%dT%H:%M:%SZ",
                )
                log = logging.getLogger("neo4j-ingest")

                log.info("=== Neo4j Ingest Job Starting ===")

                bq_project = os.environ["GCP_PROJECT"]
                bq_dataset = os.environ["BQ_DATASET"]
                neo4j_uri = os.environ["NEO4J_URI"]
                # NEO4J_AUTH is in the format "username/password" as set by the Neo4j Helm chart
                neo4j_auth = os.environ["NEO4J_AUTH"]
                neo4j_user, neo4j_password = neo4j_auth.split("/", 1)

                log.info(f"BQ project: {bq_project}, dataset: {bq_dataset}")
                log.info(f"Neo4j URI: {neo4j_uri}, user: {neo4j_user}")

                log.info("Initialising BigQuery client...")
                bq_client = bigquery.Client(project=bq_project)

                log.info("Initialising Neo4j driver...")
                driver = GraphDatabase.driver(neo4j_uri, auth=(neo4j_user, neo4j_password))
                driver.verify_connectivity()
                log.info("Neo4j connection verified")

                WATERMARK_TABLE = f"{bq_project}.{bq_dataset}.neo4j_ingest_watermark"


                def ensure_watermark_table():
                    """Create the watermark table if it does not exist."""
                    log.info(f"Ensuring watermark table exists: {WATERMARK_TABLE}")
                    ddl = f"""
                    CREATE TABLE IF NOT EXISTS `{WATERMARK_TABLE}` (
                      entity_type STRING NOT NULL,
                      last_processed_at TIMESTAMP NOT NULL
                    )
                    """
                    bq_client.query(ddl).result()
                    log.info("Watermark table ready")


                def get_watermark(entity_type):
                    """Get the last processed_at timestamp for an entity type."""
                    query = f"""
                    SELECT last_processed_at
                    FROM `{WATERMARK_TABLE}`
                    WHERE entity_type = @entity_type
                    """
                    job_config = bigquery.QueryJobConfig(
                        query_parameters=[
                            bigquery.ScalarQueryParameter("entity_type", "STRING", entity_type)
                        ]
                    )
                    rows = list(bq_client.query(query, job_config=job_config).result())
                    if rows:
                        ts = rows[0].last_processed_at
                        log.info(f"Watermark for '{entity_type}': {ts}")
                        return ts
                    log.info(f"No watermark found for '{entity_type}' — will perform full load")
                    return None


                def update_watermark(entity_type, last_processed_at):
                    """Upsert the watermark for an entity type."""
                    log.info(f"Updating watermark for '{entity_type}' to {last_processed_at}")
                    query = f"""
                    MERGE `{WATERMARK_TABLE}` t
                    USING (SELECT @entity_type AS entity_type, @ts AS last_processed_at) s
                    ON t.entity_type = s.entity_type
                    WHEN MATCHED THEN UPDATE SET t.last_processed_at = s.last_processed_at
                    WHEN NOT MATCHED THEN INSERT (entity_type, last_processed_at) VALUES (s.entity_type, s.last_processed_at)
                    """
                    job_config = bigquery.QueryJobConfig(
                        query_parameters=[
                            bigquery.ScalarQueryParameter("entity_type", "STRING", entity_type),
                            bigquery.ScalarQueryParameter("ts", "TIMESTAMP", last_processed_at),
                        ]
                    )
                    bq_client.query(query, job_config=job_config).result()
                    log.info(f"Watermark for '{entity_type}' updated successfully")


                def fetch_new_rows(table_name, entity_type):
                    """Fetch only rows processed after the last watermark."""
                    watermark = get_watermark(entity_type)
                    if watermark:
                        log.info(f"Fetching rows from '{table_name}' where processed_at > {watermark}")
                        query = f"""
                        SELECT * FROM `{bq_project}.{bq_dataset}.{table_name}`
                        WHERE processed_at > @watermark
                        ORDER BY processed_at ASC
                        """
                        job_config = bigquery.QueryJobConfig(
                            query_parameters=[
                                bigquery.ScalarQueryParameter("watermark", "TIMESTAMP", watermark)
                            ]
                        )
                        results = bq_client.query(query, job_config=job_config).result()
                    else:
                        log.info(f"Full load from '{table_name}'")
                        query = f"""
                        SELECT * FROM `{bq_project}.{bq_dataset}.{table_name}`
                        ORDER BY processed_at ASC
                        """
                        results = bq_client.query(query).result()

                    rows = [dict(row) for row in results]
                    log.info(f"Fetched {len(rows)} row(s) from '{table_name}'")
                    return rows


                def create_constraints(session):
                    log.info("Creating Neo4j uniqueness constraints...")
                    session.run(
                        "CREATE CONSTRAINT customer_id IF NOT EXISTS "
                        "FOR (c:Customer) REQUIRE c.customer_id IS UNIQUE"
                    )
                    session.run(
                        "CREATE CONSTRAINT account_id IF NOT EXISTS "
                        "FOR (a:Account) REQUIRE a.account_id IS UNIQUE"
                    )
                    session.run(
                        "CREATE CONSTRAINT address_id IF NOT EXISTS "
                        "FOR (d:Address) REQUIRE d.address_id IS UNIQUE"
                    )
                    log.info("Constraints applied")


                def ingest_customers(session, customers):
                    log.info(f"Ingesting {len(customers)} Customer node(s) into Neo4j...")
                    query = """
                    UNWIND $rows AS row
                    MERGE (c:Customer {customer_id: row.customer_id})
                    SET c.first_name = row.first_name,
                        c.last_name = row.last_name,
                        c.dob_raw = row.dob_raw,
                        c.email = row.email,
                        c.phone = row.phone,
                        c.phone_number = row.phone_number
                    """
                    session.run(query, rows=customers)
                    log.info(f"Customer nodes ingested successfully")


                def ingest_accounts(session, accounts):
                    log.info(f"Ingesting {len(accounts)} Account node(s) into Neo4j...")
                    query = """
                    UNWIND $rows AS row
                    MERGE (a:Account {account_id: row.account_id})
                    SET a.account_type = row.account_type,
                        a.sort_code = row.sort_code,
                        a.account_number = row.account_number,
                        a.opened_date_raw = row.opened_date_raw
                    WITH a, row
                    MATCH (c:Customer {customer_id: row.customer_id})
                    MERGE (c)-[:HAS_ACCOUNT]->(a)
                    """
                    session.run(query, rows=accounts)
                    log.info(f"Account nodes and HAS_ACCOUNT relationships ingested successfully")


                def ingest_addresses(session, addresses):
                    log.info(f"Ingesting {len(addresses)} Address node(s) into Neo4j...")
                    query = """
                    UNWIND $rows AS row
                    MERGE (d:Address {address_id: row.address_id})
                    SET d.line1 = row.line1,
                        d.city = row.city,
                        d.postcode = row.postcode,
                        d.country = row.country,
                        d.full_address = row.full_address
                    WITH d, row
                    MATCH (c:Customer {customer_id: row.customer_id})
                    MERGE (c)-[:HAS_ADDRESS]->(d)
                    """
                    session.run(query, rows=addresses)
                    log.info(f"Address nodes and HAS_ADDRESS relationships ingested successfully")


                # Ensure watermark table exists
                ensure_watermark_table()

                # Fetch only new rows from enriched tables since last run
                log.info("--- Fetching new rows from BigQuery enriched tables ---")
                customers = fetch_new_rows("customer_enriched", "customer")
                accounts = fetch_new_rows("account_enriched", "account")
                addresses = fetch_new_rows("address_enriched", "address")

                log.info(
                    f"Rows to ingest — customers: {len(customers)}, "
                    f"accounts: {len(accounts)}, addresses: {len(addresses)}"
                )

                if not customers and not accounts and not addresses:
                    log.info("No new rows to ingest. Exiting.")
                else:
                    log.info("--- Ingesting into Neo4j ---")
                    with driver.session() as session:
                        create_constraints(session)

                        if customers:
                            ingest_customers(session, customers)
                            max_ts = max(r["processed_at"] for r in customers)
                            update_watermark("customer", max_ts)
                        else:
                            log.info("No new Customer rows — skipping")

                        if accounts:
                            ingest_accounts(session, accounts)
                            max_ts = max(r["processed_at"] for r in accounts)
                            update_watermark("account", max_ts)
                        else:
                            log.info("No new Account rows — skipping")

                        if addresses:
                            ingest_addresses(session, addresses)
                            max_ts = max(r["processed_at"] for r in addresses)
                            update_watermark("address", max_ts)
                        else:
                            log.info("No new Address rows — skipping")

                    log.info("=== Neo4j ingest completed successfully ===")

                driver.close()
                log.info("Neo4j driver closed")
                PY
            env:
            - name: GCP_PROJECT
              value: "project-61358164-b71e-4422-a5c"
            - name: BQ_DATASET
              value: "qe_hack_syndicate_insight"
            - name: NEO4J_URI
              value: "bolt://34.69.104.67:7687"
            - name: NEO4J_AUTH
              valueFrom:
                secretKeyRef:
                  name: neo4j-auth
                  key: NEO4J_AUTH
            resources:
              requests:
                memory: "512Mi"
                cpu: "250m"
              limits:
                memory: "1Gi"
                cpu: "500m"
