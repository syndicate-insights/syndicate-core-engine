# Public Ingress for the QE Quality Agent's Jira webhook.
#
# Jira Cloud cannot reach a ClusterIP Service. We expose ONLY the webhook path
# via a path-prefix Ingress (the rest of the API stays in-cluster only).
# TLS is terminated at the GCP Load Balancer using the pre-shared GCP SSL
# certificate named `qe-agent` (created via GCP Console or gcloud compute
# ssl-certificates). Set the ingress host rule to match the cert's domain.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qe-quality-agent-webhook
  namespace: qe-hack-syndicate
  annotations:
    kubernetes.io/ingress.class: "gce"
    # Pre-shared GCP SSL certificate created via GCP Console or gcloud.
    # The certificate named `qe-agent` must already exist in the same GCP project.
    ingress.gcp.kubernetes.io/pre-shared-cert: "qe-agent"
spec:
  rules:
    - http:
        paths:
          - path: /qe/jira/webhook
            pathType: Prefix
            backend:
              service:
                name: qe-quality-agent
                port:
                  number: 8080
          - path: /healthz
            pathType: Exact
            backend:
              service:
                name: qe-quality-agent
                port:
                  number: 8080
