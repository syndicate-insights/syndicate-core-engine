# Public Ingress for the QE Quality Agent's Jira webhook.
#
# Jira Cloud cannot reach a ClusterIP Service. We expose ONLY the webhook path
# via a path-prefix Ingress (the rest of the API stays in-cluster only).
# This Ingress is configured for an external load balancer IP (no hostname
# requirement). After apply, use the assigned EXTERNAL-IP in Jira webhook URLs.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qe-quality-agent-webhook
  namespace: qe-hack-syndicate
  annotations:
    kubernetes.io/ingress.class: "gce"
spec:
  rules:
    - http:
        paths:
          - path: /qe/jira/webhook
            pathType: Prefix
            backend:
              service:
                name: qe-quality-agent
                port:
                  number: 8080
          - path: /healthz
            pathType: Exact
            backend:
              service:
                name: qe-quality-agent
                port:
                  number: 8080
