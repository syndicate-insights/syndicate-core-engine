# QE Quality Agent — long-running Deployment exposing the ADK + /qe API.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qe-quality-agent
  namespace: qe-hack-syndicate
  labels:
    app: qe-quality-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qe-quality-agent
  template:
    metadata:
      labels:
        app: qe-quality-agent
    spec:
      serviceAccountName: qe-hack-syndicate-k8s-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      # The static-analysis, coding-standards and dbt suites lint the repository
      # source at REPO_ROOT (/workspace/syndicate-core-engine). The agent image
      # only ships agent/ + cli/, so an init container clones the repo into a
      # shared volume — mirroring how the dbt cronjobs pull the source. Restart
      # the Deployment to re-pull the latest main before a fresh quality sweep.
      initContainers:
        - name: git-clone
          image: alpine/git:2.45.2
          env:
            - name: GIT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: git-credentials
                  key: token
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              rm -rf /workspace/syndicate-core-engine
              git clone --depth 1 \
                "https://${GIT_TOKEN}@github.com/syndicate-insights/syndicate-core-engine.git" \
                /workspace/syndicate-core-engine
          volumeMounts:
            - name: repo-src
              mountPath: /workspace
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      containers:
        - name: qe-quality-agent
          # Replace with your pushed image, e.g.
          # us-central1-docker.pkg.dev/project-61358164-b71e-4422-a5c/qe/qe-quality-agent:0.1.0
          image: us-central1-docker.pkg.dev/project-61358164-b71e-4422-a5c/qe/qe-quality-agent:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: qe-quality-agent-config
          env:
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: qe-quality-agent-secrets
                  key: NEO4J_PASSWORD
            - name: JIRA_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: qe-quality-agent-secrets
                  key: JIRA_API_TOKEN
            - name: HARNESS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: qe-quality-agent-secrets
                  key: HARNESS_API_KEY
            - name: HARNESS_ACCOUNT_ID
              valueFrom:
                secretKeyRef:
                  name: qe-quality-agent-secrets
                  key: HARNESS_ACCOUNT_ID
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: qe-quality-agent-secrets
                  key: GITHUB_TOKEN
            - name: JIRA_WEBHOOK_TOKEN
              valueFrom:
                secretKeyRef:
                  name: qe-quality-agent-secrets
                  key: JIRA_WEBHOOK_TOKEN
            - name: HARNESS_BDD_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: qe-quality-agent-secrets
                  key: HARNESS_BDD_WEBHOOK_URL
          volumeMounts:
            - name: repo-src
              mountPath: /workspace
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: repo-src
          emptyDir: {}
