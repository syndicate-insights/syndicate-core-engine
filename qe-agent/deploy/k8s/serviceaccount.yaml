# Kubernetes ServiceAccount for the QE Quality Agent.
# Bound to a GCP service account via Workload Identity so all GCP access is
# least-privilege and auditable (no JSON keys in the cluster).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: qe-quality-agent-sa
  namespace: qe-hack-syndicate
  annotations:
    # GCP SA that this KSA impersonates via Workload Identity.
    iam.gke.io/gcp-service-account: qe-quality-agent-svc@project-61358164-b71e-4422-a5c.iam.gserviceaccount.com
