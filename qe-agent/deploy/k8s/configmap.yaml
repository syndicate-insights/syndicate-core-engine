# Non-secret runtime configuration for the QE Quality Agent.
apiVersion: v1
kind: ConfigMap
metadata:
  name: qe-quality-agent-config
  namespace: qe-hack-syndicate
data:
  GCP_PROJECT: "project-61358164-b71e-4422-a5c"
  BQ_DATASET: "qe_hack_syndicate_insight"
  BQ_LOCATION: "us-central1"
  GCS_BUCKET_NAME: "qe_hack_syndicate_raw"
  K8S_NAMESPACE: "qe-hack-syndicate"
  # Empty: use the qe-hack-syndicate-k8s-sa Workload Identity directly (same as
  # the dbt jobs / synthetic data generator), no impersonation hop.
  IMPERSONATE_SERVICE_ACCOUNT: ""
  # Use the in-cluster Neo4j Service DNS for CI reachability.
  NEO4J_URI: "bolt://neo4j.qe-hack-syndicate.svc.cluster.local:7687"
  NEO4J_USER: "neo4j"
  GOOGLE_GENAI_USE_VERTEXAI: "1"
  GOOGLE_CLOUD_LOCATION: "us-central1"
  QE_AGENT_MODEL: "gemini-2.0-flash"
  REPO_ROOT: "/workspace/syndicate-core-engine"
  # Non-functional SLA thresholds (seconds).
  DBT_JOB_SLA_SECONDS: "3600"
  INGEST_SLA_SECONDS: "1800"
  BQ_QUERY_SLA_SECONDS: "10"
