# Non-secret runtime configuration for the QE Quality Agent.
apiVersion: v1
kind: ConfigMap
metadata:
  name: qe-quality-agent-config
  namespace: qe-hack-syndicate
data:
  LOG_LEVEL: "DEBUG"
  # Color-coded trace logging (agent lifecycle, model calls, tool/function
  # calls, source -> destination, tokens). "0" disables ANSI colors; LOG_MAX_LEN
  # caps how many characters of each payload are logged before truncation.
  LOG_COLOR: "1"
  LOG_MAX_LEN: "2000"
  GCP_PROJECT: "project-61358164-b71e-4422-a5c"
  BQ_DATASET: "qe_hack_syndicate_insight"
  BQ_LOCATION: "us-central1"
  GCS_BUCKET_NAME: "qe_hack_syndicate_raw"
  K8S_NAMESPACE: "qe-hack-syndicate"
  # Empty: use the qe-hack-syndicate-k8s-sa Workload Identity directly (same as
  # the dbt jobs / synthetic data generator), no impersonation hop.
  IMPERSONATE_SERVICE_ACCOUNT: ""
  # Use the in-cluster Neo4j Service DNS for CI reachability.
  NEO4J_URI: "bolt://neo4j.qe-hack-syndicate.svc.cluster.local:7687"
  NEO4J_USER: "neo4j"
  GOOGLE_GENAI_USE_VERTEXAI: "1"
  GOOGLE_CLOUD_LOCATION: "us-central1"
  QE_AGENT_MODEL: "gemini-2.0-flash"
  REPO_ROOT: "/workspace/syndicate-core-engine"
  # Non-functional SLA thresholds (seconds).
  DBT_JOB_SLA_SECONDS: "3600"
  INGEST_SLA_SECONDS: "1800"
  BQ_QUERY_SLA_SECONDS: "10"
  # --- BDD authoring (Jira / Harness / GitHub) ---
  JIRA_BASE_URL: "https://insight-syndicate-qe-hack.atlassian.net"
  JIRA_USER: "syndicate.insights@astom.tools"
  JIRA_PROJECT: "SYN"
  JIRA_TEST_ISSUETYPE: "Subtask"
  # Optional: custom field id holding Acceptance Criteria. Leave blank to scan
  # the description for an "Acceptance Criteria" section.
  JIRA_AC_FIELD: ""
  HARNESS_BASE_URL: "https://app.harness.io"
  HARNESS_ORG_ID: "default"
  HARNESS_PROJECT_ID: "QE_HACK"
  HARNESS_BDD_PIPELINE_ID: "bdd_tests"
  GITHUB_API_URL: "https://api.github.com"
  GITHUB_REPO: "syndicate-insights/syndicate-core-engine"
  GIT_DEFAULT_BRANCH: "main"
  GIT_AUTHOR_NAME: "qe-quality-agent"
  GIT_AUTHOR_EMAIL: "lloydsaiagent@gmail.com"
  # Jira webhook listener: which status name means "ready to test", and which
  # issuetypes are allowed to fire BDD authoring / pipeline triggers.
  JIRA_TESTING_STATUS: "Testing"
  JIRA_TRIGGER_ISSUETYPES: "Story,Task,Bug"
  # Parent-ticket transitions applied after a BDD run syncs results back:
  #   all scenarios pass -> JIRA_TICKET_PASS_STATUS; any fail -> JIRA_TICKET_FAIL_STATUS.
  JIRA_TICKET_PASS_STATUS: "Done"
  JIRA_TICKET_FAIL_STATUS: "In Progress"
