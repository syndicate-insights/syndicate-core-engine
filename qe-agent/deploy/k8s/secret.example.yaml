# EXAMPLE secret — do NOT commit real values. Create the real secret with:
#   kubectl create secret generic qe-quality-agent-secrets \
#     --namespace qe-hack-syndicate \
#     --from-literal=NEO4J_PASSWORD='<neo4j-password>'
#
# Alternatively reuse the existing neo4j-auth secret used by neo4j-ingest.
apiVersion: v1
kind: Secret
metadata:
  name: qe-quality-agent-secrets
  namespace: qe-hack-syndicate
type: Opaque
stringData:
  NEO4J_PASSWORD: "changeme-strong-password"
  # Jira API token (https://id.atlassian.com/manage-profile/security/api-tokens)
  JIRA_API_TOKEN: "changeme-jira-api-token"
  # Harness NextGen API key (Account-level, scope: read pipelines + read execs).
  HARNESS_API_KEY: "changeme-harness-pat"
  HARNESS_ACCOUNT_ID: "changeme-account-id"
  # GitHub fine-grained PAT or App installation token, scope: repo:contents,
  # pull-requests, issues. Used by the BDD authoring sub-agent to open PRs.
  GITHUB_TOKEN: "changeme-github-token"
  # Shared secret that Jira Cloud sends as ?token=... on every webhook call.
  # Rotate by re-creating the Secret and updating the Jira webhook URL.
  JIRA_WEBHOOK_TOKEN: "changeme-jira-webhook-token"
  # Pre-issued Harness Custom Webhook URL for the BDD trigger
  # (.harness/.../triggers/jira_testing_transition.yaml). The full URL acts as
  # the auth — keep it secret.
  HARNESS_BDD_WEBHOOK_URL: "https://app.harness.io/gateway/pipeline/api/webhook/custom/v3?accountIdentifier=...&orgIdentifier=default&projectIdentifier=QE_HACK&pipelineIdentifier=bdd_tests&triggerIdentifier=jira_testing_transition"
