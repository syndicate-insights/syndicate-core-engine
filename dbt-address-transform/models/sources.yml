version: 2

sources:
  - name: gcs_raw
    database: "{{ var('bq_project') }}"
    schema: "{{ var('bq_dataset') }}"
    tables:
      - name: address_raw_data
        description: >
          External table pointing to address CSV files in GCS bucket.
          Each CSV contains: address_id, customer_id, line1, city, postcode, country.
        columns:
          - name: address_id
            data_type: string
          - name: customer_id
            data_type: string
          - name: line1
            data_type: string
          - name: city
            data_type: string
          - name: postcode
            data_type: string
          - name: country
            data_type: string
