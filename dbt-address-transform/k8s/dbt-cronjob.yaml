apiVersion: batch/v1
kind: CronJob
metadata:
  name: dbt-address-transform-cronjob
  namespace: qe-hack-syndicate
spec:
  schedule: "*/2 * * * *" # Runs every day at 6pm
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          serviceAccountName: qe-hack-syndicate-k8s-sa
          restartPolicy: OnFailure
          containers:
          - name: dbt-address-transform
            image: python:3.11-slim
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -e
                pip install --quiet dbt-bigquery==1.8.* google-cloud-storage google-cloud-bigquery
                apt-get update -qq && apt-get install -y -qq git > /dev/null 2>&1

                # Clone and navigate
                git clone https://${GIT_TOKEN}@github.com/syndicate-insights/syndicate-core-engine.git /tmp/repo
                cd /tmp/repo/dbt-address-transform

                # Detect profile name from dbt_project.yml to ensure profiles.yml is valid
                PROFILE_NAME=$(grep "^profile:" dbt_project.yml | cut -d':' -f2 | tr -d '[:space:]' | tr -d "'\"")
                P_NAME="${PROFILE_NAME:-syndicate_address_transform}"
                echo "Using detected profile name: $P_NAME"

                # Explicit values for Project and Dataset
                PROJ="project-61358164-b71e-4422-a5c"
                DATASET="qe_hack_syndicate_insight"

                # Write profiles.yml to expected location
                mkdir -p /root/.dbt
                printf "%s:\n  target: prod\n  outputs:\n    prod:\n      type: bigquery\n      method: oauth\n      project: %s\n      dataset: %s\n      threads: 4\n      timeout_seconds: 300\n      location: us-central1\n      retries: 1\n" "$P_NAME" "$PROJ" "$DATASET" > /root/.dbt/profiles.yml

                # Define dbt variables explicitly to prevent dbt from using the dataset name as a project ID
                DBT_VARS="database: $PROJ, gcp_project: $PROJ, bq_project: $PROJ, bq_dataset: $DATASET, dataset: $DATASET"

                # Run dbt
                dbt deps

                # Load GCS CSV data into regular table without requiring bq CLI.
                python - <<'PY'
                import os
                from google.cloud import bigquery
                from google.cloud import storage

                proj = os.environ["GCP_PROJECT"]
                dataset = os.environ["BQ_DATASET"]
                bucket = os.environ["GCS_BUCKET_NAME"]
                table_id = f"{proj}.{dataset}.address_raw_data"

                # Support both possible key layouts and gather concrete CSV objects:
                # 1) address/<file>.csv
                # 2) qe_hack_syndicate_raw/address/<file>.csv
                candidate_prefixes = [
                  "address/",
                  f"{bucket}/address/",
                ]

                storage_client = storage.Client(project=proj)
                uris = []
                for prefix in candidate_prefixes:
                  for blob in storage_client.list_blobs(bucket, prefix=prefix):
                    if blob.name.lower().endswith(".csv"):
                      uris.append(f"gs://{bucket}/{blob.name}")

                if not uris:
                  raise RuntimeError(
                    f"No address CSV files found in gs://{bucket}/address/ or gs://{bucket}/{bucket}/address/"
                  )

                # Deduplicate and sort for deterministic loading.
                uris = sorted(set(uris))

                client = bigquery.Client(project=proj)
                job_config = bigquery.LoadJobConfig(
                  source_format=bigquery.SourceFormat.CSV,
                  skip_leading_rows=1,
                  write_disposition=bigquery.WriteDisposition.WRITE_TRUNCATE,
                  schema=[
                    bigquery.SchemaField("address_id", "STRING"),
                    bigquery.SchemaField("customer_id", "STRING"),
                    bigquery.SchemaField("line1", "STRING"),
                    bigquery.SchemaField("city", "STRING"),
                    bigquery.SchemaField("postcode", "STRING"),
                    bigquery.SchemaField("country", "STRING"),
                  ],
                )

                load_job = client.load_table_from_uri(uris, table_id, job_config=job_config)
                load_job.result()
                print(f"Loaded {len(uris)} file(s) into {table_id}")
                PY

                dbt run --vars "{$DBT_VARS}"

                echo "dbt address transform completed successfully."
            env:
            - name: GCP_PROJECT
              value: "project-61358164-b71e-4422-a5c"
            - name: BQ_DATASET
              value: "qe_hack_syndicate_insight" # Override with your target BQ dataset
            - name: GCS_BUCKET_NAME
              value: "qe_hack_syndicate_raw"
            - name: GIT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: git-credentials
                  key: token
                  optional: true
            resources:
              requests:
                memory: "512Mi"
                cpu: "250m"
              limits:
                memory: "1Gi"
                cpu: "500m"
