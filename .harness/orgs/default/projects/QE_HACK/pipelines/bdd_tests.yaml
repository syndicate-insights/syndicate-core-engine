pipeline:
  name: bdd tests
  identifier: bdd_tests
  projectIdentifier: QE_HACK
  orgIdentifier: default
  tags:
    bdd: cucumber
    owner: qe-hack-syndicate
  properties:
    ci:
      codebase:
        connectorRef: account.syndicateGitHubConnector
        repoName: syndicate-core-engine
        build:
          type: branch
          spec:
            branch: main
  variables:
    - name: QE_AGENT_URL
      type: String
      description: In-cluster URL of the QE agent Service.
      value: http://qe-quality-agent.qe-hack-syndicate.svc.cluster.local:8080
    - name: jiraTicket
      type: String
      description: Jira ticket whose acceptance criteria drove this run (optional).
      value: <+input>.default("")
  stages:
    - stage:
        name: Coding Standards - Static Analysis
        identifier: coding_standards_static_analysis
        type: Custom
        spec:
          execution:
            steps:
              - parallel:
                  - step:
                      type: Http
                      name: CS1 dbt model naming convention
                      identifier: CS1
                      timeout: 15m
                      spec:
                        url: <+pipeline.variables.QE_AGENT_URL>/qe/scenario/standards/CS1/run-sync?ticket=<+pipeline.variables.jiraTicket>&execution_url=https://app.harness.io/ng/account/<+account.identifier>/cd/orgs/<+pipeline.orgIdentifier>/projects/<+pipeline.projectIdentifier>/pipelines/<+pipeline.identifier>/executions/<+pipeline.executionId>/pipeline
                        method: POST
                        headers: []
                        outputVariables: []
                        assertion: <+json.object(httpResponseBody).status> == "PASS"
                  - step:
                      type: Http
                      name: CS2 Primary-key data tests declared
                      identifier: CS2
                      timeout: 15m
                      spec:
                        url: <+pipeline.variables.QE_AGENT_URL>/qe/scenario/standards/CS2/run-sync?ticket=<+pipeline.variables.jiraTicket>&execution_url=https://app.harness.io/ng/account/<+account.identifier>/cd/orgs/<+pipeline.orgIdentifier>/projects/<+pipeline.projectIdentifier>/pipelines/<+pipeline.identifier>/executions/<+pipeline.executionId>/pipeline
                        method: POST
                        headers: []
                        outputVariables: []
                        assertion: <+json.object(httpResponseBody).status> == "PASS"
                  - step:
                      type: Http
                      name: CS3 dbt sources documented
                      identifier: CS3
                      timeout: 15m
                      spec:
                        url: <+pipeline.variables.QE_AGENT_URL>/qe/scenario/standards/CS3/run-sync?ticket=<+pipeline.variables.jiraTicket>&execution_url=https://app.harness.io/ng/account/<+account.identifier>/cd/orgs/<+pipeline.orgIdentifier>/projects/<+pipeline.projectIdentifier>/pipelines/<+pipeline.identifier>/executions/<+pipeline.executionId>/pipeline
                        method: POST
                        headers: []
                        outputVariables: []
                        assertion: <+json.object(httpResponseBody).status> == "PASS"
                  - step:
                      type: Http
                      name: CS4 Kubernetes manifest hygiene
                      identifier: CS4
                      timeout: 15m
                      spec:
                        url: <+pipeline.variables.QE_AGENT_URL>/qe/scenario/standards/CS4/run-sync?ticket=<+pipeline.variables.jiraTicket>&execution_url=https://app.harness.io/ng/account/<+account.identifier>/cd/orgs/<+pipeline.orgIdentifier>/projects/<+pipeline.projectIdentifier>/pipelines/<+pipeline.identifier>/executions/<+pipeline.executionId>/pipeline
                        method: POST
                        headers: []
                        outputVariables: []
                        assertion: <+json.object(httpResponseBody).status> == "PASS"
                  - step:
                      type: Http
                      name: CS5 Foreign-key naming consistency
                      identifier: CS5
                      timeout: 15m
                      spec:
                        url: <+pipeline.variables.QE_AGENT_URL>/qe/scenario/standards/CS5/run-sync?ticket=<+pipeline.variables.jiraTicket>&execution_url=https://app.harness.io/ng/account/<+account.identifier>/cd/orgs/<+pipeline.orgIdentifier>/projects/<+pipeline.projectIdentifier>/pipelines/<+pipeline.identifier>/executions/<+pipeline.executionId>/pipeline
                        method: POST
                        headers: []
                        outputVariables: []
                        assertion: <+json.object(httpResponseBody).status> == "PASS"
                  - step:
                      type: Http
                      name: SA1 dbt SQL lint
                      identifier: SA1
                      timeout: 15m
                      spec:
                        url: <+pipeline.variables.QE_AGENT_URL>/qe/scenario/static/SA1/run-sync?ticket=<+pipeline.variables.jiraTicket>&execution_url=https://app.harness.io/ng/account/<+account.identifier>/cd/orgs/<+pipeline.orgIdentifier>/projects/<+pipeline.projectIdentifier>/pipelines/<+pipeline.identifier>/executions/<+pipeline.executionId>/pipeline
                        method: POST
                        headers: []
                        outputVariables: []
                        assertion: <+json.object(httpResponseBody).status> == "PASS"
                  - step:
                      type: Http
                      name: SA2 Python lint
                      identifier: SA2
                      timeout: 15m
                      spec:
                        url: <+pipeline.variables.QE_AGENT_URL>/qe/scenario/static/SA2/run-sync?ticket=<+pipeline.variables.jiraTicket>&execution_url=https://app.harness.io/ng/account/<+account.identifier>/cd/orgs/<+pipeline.orgIdentifier>/projects/<+pipeline.projectIdentifier>/pipelines/<+pipeline.identifier>/executions/<+pipeline.executionId>/pipeline
                        method: POST
                        headers: []
                        outputVariables: []
                        assertion: <+json.object(httpResponseBody).status> == "PASS"
                  - step:
                      type: Http
                      name: SA3 Python security scan
                      identifier: SA3
                      timeout: 15m
                      spec:
                        url: <+pipeline.variables.QE_AGENT_URL>/qe/scenario/static/SA3/run-sync?ticket=<+pipeline.variables.jiraTicket>&execution_url=https://app.harness.io/ng/account/<+account.identifier>/cd/orgs/<+pipeline.orgIdentifier>/projects/<+pipeline.projectIdentifier>/pipelines/<+pipeline.identifier>/executions/<+pipeline.executionId>/pipeline
                        method: POST
                        headers: []
                        outputVariables: []
                        assertion: <+json.object(httpResponseBody).status> == "PASS"
                  - step:
                      type: Http
                      name: SA4 YAML lint
                      identifier: SA4
                      timeout: 15m
                      spec:
                        url: <+pipeline.variables.QE_AGENT_URL>/qe/scenario/static/SA4/run-sync?ticket=<+pipeline.variables.jiraTicket>&execution_url=https://app.harness.io/ng/account/<+account.identifier>/cd/orgs/<+pipeline.orgIdentifier>/projects/<+pipeline.projectIdentifier>/pipelines/<+pipeline.identifier>/executions/<+pipeline.executionId>/pipeline
                        method: POST
                        headers: []
                        outputVariables: []
                        assertion: <+json.object(httpResponseBody).status> == "PASS"
                  - step:
                      type: Http
                      name: SA5 Hardcoded secret scan
                      identifier: SA5
                      timeout: 15m
                      spec:
                        url: <+pipeline.variables.QE_AGENT_URL>/qe/scenario/static/SA5/run-sync?ticket=<+pipeline.variables.jiraTicket>&execution_url=https://app.harness.io/ng/account/<+account.identifier>/cd/orgs/<+pipeline.orgIdentifier>/projects/<+pipeline.projectIdentifier>/pipelines/<+pipeline.identifier>/executions/<+pipeline.executionId>/pipeline
                        method: POST
                        headers: []
                        outputVariables: []
                        assertion: <+json.object(httpResponseBody).status> == "PASS"
        tags: {}
    - stage:
        name: Functional - Integration Testing
        identifier: functional_integration_testing
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: account.gke_qe_hack_syndicate
              namespace: qe-hack-syndicate
          execution:
            steps:
              - step:
                  name: Functional - Integration Testing
                  identifier: functional_integration
                  type: Run
                  timeout: 30m
                  spec:
                    connectorRef: org.dockerhub
                    image: maven:3.9.6-eclipse-temurin-21
                    shell: Bash
                    envVariables:
                      QE_AGENT_URL: <+pipeline.variables.QE_AGENT_URL>
                      QE_AGENT_TIMEOUT_SECONDS: "900"
                      JIRA_TICKET: <+pipeline.variables.jiraTicket>
                    command: |
                      set -euo pipefail
                      cd bdd-tests
                      # Fresh workspace: drop stale target/ so deleted features
                      # don't re-run (Maven copies but never prunes resources).
                      rm -rf target
                      # This stage runs ONLY Functional & Integration BDD features.
                      # Coding Standards, Static Analysis and Non-Functional are
                      # validated in their own non-BDD stages via the agent API,
                      # so remove their feature dirs from this throwaway clone.
                      rm -rf src/test/resources/feature/CodingStandards \
                             src/test/resources/feature/StaticAnalysis \
                             src/test/resources/feature/NonFunctional
                      mvn -B -ntp clean test
                    reports:
                      type: JUnit
                      spec:
                        paths:
                          - bdd-tests/target/cucumber-junit.xml
              - step:
                  name: Sync Results to Jira
                  identifier: sync_jira
                  type: Run
                  when:
                    stageStatus: All
                    condition: <+pipeline.variables.jiraTicket> != ""
                  spec:
                    connectorRef: org.dockerhub
                    image: maven:3.9.6-eclipse-temurin-21
                    shell: Bash
                    command: |
                      set -eo pipefail
                      # The agent pod cannot read this CI workspace, so POST the
                      # cucumber.json *content* in the request body. Use --data-binary
                      # to preserve the JSON exactly. Don't fail the step if the sync
                      # call errors (results are best-effort feedback to Jira).
                      curl -sS -X POST --max-time 600 \
                        -H "Content-Type: application/json" \
                        --data-binary @bdd-tests/target/cucumber.json \
                        "<+pipeline.variables.QE_AGENT_URL>/qe/jira/<+pipeline.variables.jiraTicket>/sync-results?execution_url=https://app.harness.io/ng/account/<+account.identifier>/cd/orgs/<+pipeline.orgIdentifier>/projects/<+pipeline.projectIdentifier>/pipelines/<+pipeline.identifier>/executions/<+pipeline.executionId>/pipeline" \
                        || echo "WARN: Jira sync call failed (non-fatal)"
        tags: {}
    - stage:
        name: Non-Functional Testing
        identifier: non_functional_testing
        type: Custom
        spec:
          execution:
            steps:
              - parallel:
                  - step:
                      type: Http
                      name: N1 Performance - SLA
                      identifier: N1
                      timeout: 20m
                      spec:
                        url: <+pipeline.variables.QE_AGENT_URL>/qe/scenario/nonfunctional/N1/run-sync?ticket=<+pipeline.variables.jiraTicket>&execution_url=https://app.harness.io/ng/account/<+account.identifier>/cd/orgs/<+pipeline.orgIdentifier>/projects/<+pipeline.projectIdentifier>/pipelines/<+pipeline.identifier>/executions/<+pipeline.executionId>/pipeline
                        method: POST
                        headers: []
                        outputVariables: []
                        assertion: <+json.object(httpResponseBody).status> == "PASS"
                  - step:
                      type: Http
                      name: N2 Reliability - Security posture
                      identifier: N2
                      timeout: 20m
                      spec:
                        url: <+pipeline.variables.QE_AGENT_URL>/qe/scenario/nonfunctional/N2/run-sync?ticket=<+pipeline.variables.jiraTicket>&execution_url=https://app.harness.io/ng/account/<+account.identifier>/cd/orgs/<+pipeline.orgIdentifier>/projects/<+pipeline.projectIdentifier>/pipelines/<+pipeline.identifier>/executions/<+pipeline.executionId>/pipeline
                        method: POST
                        headers: []
                        outputVariables: []
                        assertion: <+json.object(httpResponseBody).status> == "PASS"
        tags: {}
