# BDD test pipeline.
#
# Runs the Cucumber pack in `bdd-tests/` against the QE Quality Agent
# in-cluster, publishes JUnit + Cucumber reports to Harness, and pushes the
# per-scenario PASS/FAIL back to the originating Jira ticket.
#
# Trigger surfaces:
#   * Chained from the parent pipeline `quality_engineering_hack` (final stage).
#   * Custom webhook trigger fired by the QE agent when a Jira ticket
#     transitions to "Testing" (see ../triggers/jira_testing_transition.yaml).
#   * Manual run from the Pipeline Studio with `jiraTicket` set.
pipeline:
  name: bdd tests
  identifier: bdd_tests
  projectIdentifier: QE_HACK
  orgIdentifier: default
  tags:
    bdd: cucumber
    owner: qe-hack-syndicate
  codebase:
    connectorRef: account.github_syndicate
    repoName: syndicate-core-engine
    # Default to main so chained/manual runs always have checkout source.
    # If a caller provides a build input, Harness will use that value instead.
    build: <+input>.default("main")
  variables:
    - name: QE_AGENT_URL
      type: String
      description: In-cluster URL of the QE agent Service.
      value: http://qe-quality-agent.qe-hack-syndicate.svc.cluster.local:8080
    - name: jiraTicket
      type: String
      description: Jira ticket whose acceptance criteria drove this run (optional).
      value: <+input>.default("")
  stages:
    # ---------------------------------------------------------------- Stage 1
    - stage:
        name: Run BDD Cucumber Pack
        identifier: run_bdd
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: account.gke_qe_hack_syndicate
              namespace: qe-hack-syndicate
              serviceAccountName: qe-hack-syndicate-k8s-sa
          execution:
            steps:
              - step:
                  name: Maven Verify
                  identifier: mvn_verify
                  type: Run
                  timeout: 30m
                  spec:
                    connectorRef: account.dockerhub
                    image: maven:3.9.6-eclipse-temurin-21
                    shell: Bash
                    envVariables:
                      QE_AGENT_URL: <+pipeline.variables.QE_AGENT_URL>
                      QE_AGENT_TIMEOUT_SECONDS: "900"
                      JIRA_TICKET: <+pipeline.variables.jiraTicket>
                    command: |
                      set -euo pipefail
                      cd bdd-tests
                      mvn -B -ntp test
                    reports:
                      type: JUnit
                      spec:
                        paths:
                          - bdd-tests/target/cucumber-junit.xml
              - step:
                  name: Sync Results to Jira
                  identifier: sync_jira
                  type: Run
                  when:
                    stageStatus: All
                    condition: <+pipeline.variables.jiraTicket> != ""
                  spec:
                    connectorRef: account.dockerhub
                    image: maven:3.9.6-eclipse-temurin-21
                    shell: Bash
                    command: |
                      set -eo pipefail
                      # Execute the sync call within the CI workspace so cucumber.json is accessible
                      curl -fsS -X POST --max-time 600 \
                        "<+pipeline.variables.QE_AGENT_URL>/qe/jira/<+pipeline.variables.jiraTicket>/sync-results?cucumber_json_path=bdd-tests/target/cucumber.json&execution_url=https://app.harness.io/ng/account/<+account.identifier>/cd/orgs/<+pipeline.orgIdentifier>/projects/<+pipeline.projectIdentifier>/pipelines/<+pipeline.identifier>/executions/<+pipeline.executionId>/pipeline"
        tags: {}
