                              echo "$R" | grep -q '"status": *"PASS"'
                  - step:
                      name: CS3 Sources documented
                      identifier: CS3
                      type: ShellScript
                      timeout: 15m
                      spec:
                        shell: Bash
                        onDelegate: true
                        source:
                          type: Inline
                          spec:
                            script: |
                              set -eo pipefail
                              R=$(curl -fsS --max-time 900 "<+pipeline.variables.QE_AGENT_URL>/qe/scenario/standards/CS3")
                              echo "$R"
                              echo "$R" | grep -q '"status": *"PASS"'
                  - step:
                      name: CS4 K8s hygiene
                      identifier: CS4
                      type: ShellScript
                      timeout: 15m
                      spec:
                        shell: Bash
                        onDelegate: true
                        source:
                          type: Inline
                          spec:
                            script: |
                              set -eo pipefail
                              R=$(curl -fsS --max-time 900 "<+pipeline.variables.QE_AGENT_URL>/qe/scenario/standards/CS4")
                              echo "$R"
                              echo "$R" | grep -q '"status": *"PASS"'
                  - step:
                      name: CS5 FK naming
                      identifier: CS5
                      type: ShellScript
                      timeout: 15m
                      spec:
                        shell: Bash
                        onDelegate: true
                        source:
                          type: Inline
                          spec:
                            script: |
                              set -eo pipefail
                              R=$(curl -fsS --max-time 900 "<+pipeline.variables.QE_AGENT_URL>/qe/scenario/standards/CS5")
                              echo "$R"
                              echo "$R" | grep -q '"status": *"PASS"'
        tags: {}
    # ---------------------------------------------------------------- Stage 3
    - stage:
        name: Integration Testing
        identifier: integration_testing
        type: Custom
        spec:
          execution:
            steps:
              - parallel:
                  - step:
                      name: I1 GCS to BQ raw
                      identifier: I1
                      type: ShellScript
                      timeout: 20m
                      spec:
                        shell: Bash
                        onDelegate: true
                        source:
                          type: Inline
                          spec:
                            script: |
                              set -eo pipefail
                              R=$(curl -fsS --max-time 900 "<+pipeline.variables.QE_AGENT_URL>/qe/scenario/integration/I1")
                              echo "$R"
                              echo "$R" | grep -q '"status": *"PASS"'
                  - step:
                      name: I2 Raw to enriched
                      identifier: I2
                      type: ShellScript
                      timeout: 20m
                      spec:
                        shell: Bash
                        onDelegate: true
                        source:
                          type: Inline
                          spec:
                            script: |
                              set -eo pipefail
                              R=$(curl -fsS --max-time 900 "<+pipeline.variables.QE_AGENT_URL>/qe/scenario/integration/I2")
                              echo "$R"
                              echo "$R" | grep -q '"status": *"PASS"'
                  - step:
                      name: I3 Enriched to Neo4j
                      identifier: I3
                      type: ShellScript
                      timeout: 20m
                      spec:
                        shell: Bash
                        onDelegate: true
                        source:
                          type: Inline
                          spec:
                            script: |
                              set -eo pipefail
                              R=$(curl -fsS --max-time 900 "<+pipeline.variables.QE_AGENT_URL>/qe/scenario/integration/I3")
                              echo "$R"
                              echo "$R" | grep -q '"status": *"PASS"'
                  - step:
                      name: I4 Incremental watermark
                      identifier: I4
                      type: ShellScript
                      timeout: 20m
                      spec:
                        shell: Bash
                        onDelegate: true
                        source:
                          type: Inline
