                              echo "$R" | grep -q '"status": *"PASS"'
                  - step:
                      name: N2 Reliability Security
                      identifier: N2
                      type: ShellScript
                      timeout: 20m
                      spec:
                        shell: Bash
                        onDelegate: true
                        source:
