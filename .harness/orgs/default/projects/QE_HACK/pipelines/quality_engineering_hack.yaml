                              set -eo pipefail
                              R=$(curl -fsS --max-time 900 "<+pipeline.variables.QE_AGENT_URL>/qe/scenario/nonfunctional/N2")
                              echo "$R"
                              echo "$R" | grep -q '"status": *"PASS"'
        tags: {}
    # ---------------------------------------------------------------- Stage 6
    # Chain the BDD pipeline (defined separately at
    # .harness/.../pipelines/bdd_tests.yaml). It runs the Cucumber pack in
    # bdd-tests/ against the same in-cluster QE agent and publishes results
    # back to Jira ticket + Test subtasks when a ticket id is supplied.
    - stage:
        name: BDD Tests
        identifier: bdd_tests
        type: Pipeline
        spec:
          org: default
          pipeline: bdd_tests
          project: QE_HACK
          inputs:
            identifier: bdd_tests
            variables:
              - name: jiraTicket
                type: String
                value: <+pipeline.variables.jiraTicket>
        tags: {}
