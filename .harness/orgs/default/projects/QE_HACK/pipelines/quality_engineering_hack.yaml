                  - step:
                      name: I5 End-to-end consistency
                      identifier: I5
                      type: ShellScript
                      timeout: 20m
                      spec:
                        shell: Bash
                        onDelegate: true
                        source:
                          type: Inline
                          spec:
                            script: |
                              set -eo pipefail
                              R=$(curl -fsS --max-time 900 "<+pipeline.variables.QE_AGENT_URL>/qe/scenario/integration/I5")
                              echo "$R"
                              echo "$R" | grep -q '"status": *"PASS"'
        tags: {}
    # ---------------------------------------------------------------- Stage 4
    - stage:
        name: Functional Testing
        identifier: functional_testing
        type: Custom
        spec:
          execution:
            steps:
              - parallel:
                  - step:
                      name: F1 INVESTMENT positive
                      identifier: F1
                      type: ShellScript
                      timeout: 20m
                      spec:
                        shell: Bash
                        onDelegate: true
                        source:
                          type: Inline
                          spec:
                            script: |
                              set -eo pipefail
                              R=$(curl -fsS --max-time 900 "<+pipeline.variables.QE_AGENT_URL>/qe/scenario/functional/F1")
                              echo "$R"
                              echo "$R" | grep -q '"status": *"PASS"'
                  - step:
                      name: F2 INVESTMENT negative
                      identifier: F2
                      type: ShellScript
                      timeout: 20m
                      spec:
                        shell: Bash
                        onDelegate: true
                        source:
                          type: Inline
                          spec:
                            script: |
                              set -eo pipefail
                              R=$(curl -fsS --max-time 900 "<+pipeline.variables.QE_AGENT_URL>/qe/scenario/functional/F2")
                              echo "$R"
                              echo "$R" | grep -q '"status": *"PASS"'
                  - step:
                      name: F3 full_address format
                      identifier: F3
                      type: ShellScript
                      timeout: 20m
                      spec:
                        shell: Bash
                        onDelegate: true
                        source:
                          type: Inline
                          spec:
                            script: |
                              set -eo pipefail
                              R=$(curl -fsS --max-time 900 "<+pipeline.variables.QE_AGENT_URL>/qe/scenario/functional/F3")
                              echo "$R"
                              echo "$R" | grep -q '"status": *"PASS"'
                  - step:
                      name: F4 Phone normalisation
                      identifier: F4
                      type: ShellScript
                      timeout: 20m
                      spec:
                        shell: Bash
                        onDelegate: true
                        source:
                          type: Inline
                          spec:
                            script: |
                              set -eo pipefail
                              R=$(curl -fsS --max-time 900 "<+pipeline.variables.QE_AGENT_URL>/qe/scenario/functional/F4")
                              echo "$R"
                              echo "$R" | grep -q '"status": *"PASS"'
                  - step:
                      name: F5 dbt data tests
                      identifier: F5
                      type: ShellScript
                      timeout: 30m
                      spec:
                        shell: Bash
                        onDelegate: true
                        source:
                          type: Inline
                          spec:
