    # ---------------------------------------------------------------- Stage 5
    - stage:
        name: Non Functional Testing
        identifier: non_functional_testing
        type: Custom
        spec:
          execution:
            steps:
              - parallel:
                  - step:
                      name: N1 Performance SLA
                      identifier: N1
                      type: ShellScript
