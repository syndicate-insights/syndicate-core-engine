pipeline:
  name: quality engineering hack
  identifier: quality_engineering_hack
  projectIdentifier: QE_HACK
  orgIdentifier: default
  tags: {}
  # The Harness delegate and the QE agent run in the SAME namespace
  # (qe-hack-syndicate), so every step reaches the agent via in-cluster Service
  # DNS. Each step is self-contained (inline curl + gate) so it needs no
  # checked-out script on the delegate.
  variables:
    - name: QE_AGENT_URL
      type: String
      description: In-cluster URL of the QE agent Service.
      value: http://qe-quality-agent.qe-hack-syndicate.svc.cluster.local:8080
    - name: jiraTicket
      type: String
      description: Jira ticket whose acceptance criteria drove this run (optional).
      value: <+input>.default("")
  stages:
    # ---------------------------------------------------------------- Stage 1
    - stage:
        name: Static Code Analysis
        identifier: static_code_analysis
        type: Custom
        spec:
          execution:
            steps:
              - parallel:
                  - step:
                      name: SA1 dbt SQL lint
                      identifier: SA1
                      type: ShellScript
                      timeout: 15m
                      spec:
                        shell: Bash
                        onDelegate: true
                        source:
                          type: Inline
                          spec:
                            script: |
                              set -eo pipefail
                              R=$(curl -fsS --max-time 900 "<+pipeline.variables.QE_AGENT_URL>/qe/scenario/static/SA1")
                              echo "$R"
                              echo "$R" | grep -q '"status": *"PASS"'
                  - step:
                      name: SA2 Python lint
                      identifier: SA2
                      type: ShellScript
                      timeout: 15m
                      spec:
                        shell: Bash
                        onDelegate: true
                        source:
                          type: Inline
                          spec:
                            script: |
                              set -eo pipefail
                              R=$(curl -fsS --max-time 900 "<+pipeline.variables.QE_AGENT_URL>/qe/scenario/static/SA2")
                              echo "$R"
                              echo "$R" | grep -q '"status": *"PASS"'
                  - step:
                      name: SA3 Security scan
                      identifier: SA3
                      type: ShellScript
                      timeout: 15m
                      spec:
                        shell: Bash
                        onDelegate: true
                        source:
                          type: Inline
                          spec:
                            script: |
                              set -eo pipefail
                              R=$(curl -fsS --max-time 900 "<+pipeline.variables.QE_AGENT_URL>/qe/scenario/static/SA3")
                              echo "$R"
                              echo "$R" | grep -q '"status": *"PASS"'
                  - step:
                      name: SA4 YAML lint
                      identifier: SA4
                      type: ShellScript
                      timeout: 15m
                      spec:
                        shell: Bash
                        onDelegate: true
                        source:
                          type: Inline
                          spec:
                            script: |
                              set -eo pipefail
                              R=$(curl -fsS --max-time 900 "<+pipeline.variables.QE_AGENT_URL>/qe/scenario/static/SA4")
                              echo "$R"
                              echo "$R" | grep -q '"status": *"PASS"'
                  - step:
                      name: SA5 Secret scan
                      identifier: SA5
                      type: ShellScript
                      timeout: 15m
                      spec:
                        shell: Bash
                        onDelegate: true
                        source:
                          type: Inline
                          spec:
                            script: |
                              set -eo pipefail
                              R=$(curl -fsS --max-time 900 "<+pipeline.variables.QE_AGENT_URL>/qe/scenario/static/SA5")
                              echo "$R"
                              echo "$R" | grep -q '"status": *"PASS"'
        tags: {}
    # ---------------------------------------------------------------- Stage 2
    - stage:
        name: Coding Standards Check
        identifier: coding_standards_check
        type: Custom
        spec:
          execution:
            steps:
              - parallel:
                  - step:
                      name: CS1 dbt naming
                      identifier: CS1
                      type: ShellScript
                      timeout: 15m
                      spec:
                        shell: Bash
                        onDelegate: true
                        source:
                          type: Inline
                          spec:
                            script: |
                              set -eo pipefail
                              R=$(curl -fsS --max-time 900 "<+pipeline.variables.QE_AGENT_URL>/qe/scenario/standards/CS1")
                              echo "$R"
                              echo "$R" | grep -q '"status": *"PASS"'
                  - step:
                      name: CS2 PK tests present
                      identifier: CS2
                      type: ShellScript
                      timeout: 15m
                      spec:
                        shell: Bash
                        onDelegate: true
                        source:
                          type: Inline
                          spec:
                            script: |
                              set -eo pipefail
                              R=$(curl -fsS --max-time 900 "<+pipeline.variables.QE_AGENT_URL>/qe/scenario/standards/CS2")
