version: 2

models:
  - name: account_enriched
    description: >
      Final enriched account table. Sets account_type to INVESTMENT where the
      sort code's last digit is a prime number (2, 3, 5, 7) and the account
      number's last two digits are both even numbers.
    columns:
      - name: account_id
        description: Unique account identifier.
        tests:
          - not_null
      - name: customer_id
        description: Customer identifier linked to this account.
        tests:
          - not_null
      - name: account_type
        description: >
          Account type. Overridden to INVESTMENT when sort code's last digit
          is prime and account number's last two digits are both even.
      - name: sort_code
        description: Original bank sort code in XX-XX-XX format.
      - name: account_number
        description: Original bank account number.
      - name: opened_date_raw
        description: Date the account was opened in raw string format.
      - name: processed_at
        description: Timestamp when the row was processed.
